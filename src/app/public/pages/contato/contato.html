<app-site-shell>
  <main class="contact-page">
    <section class="contact-section">
      <header class="contact-header">
        <p class="contact-header__eyebrow">Fale com a gente</p>
        <h1 class="contact-header__title">Contato</h1>
      </header>

      <div class="contact-grid">
        <aside class="contact-info-card" aria-label="Informações de contato">
          <div class="contact-info__item">
            <p class="contact-info__label">WhatsApp</p>
            <a
              class="contact-info__value contact-info__value--link"
              [href]="whatsappUrl"
              target="_blank"
              rel="noreferrer"
            >
              {{ whatsappLabel }}
            </a>
          </div>

          <div class="contact-info__item">
            <p class="contact-info__label">E-mail</p>
            <a
              class="contact-info__value contact-info__value--link"
              [href]="'mailto:' + emailAddress"
            >
              {{ emailAddress }}
            </a>
          </div>

          <div class="contact-info__item">
            <p class="contact-info__label">Horário de atendimento</p>
            <p class="contact-info__value">Seg – Sex, das 8h às 20h</p>
          </div>
        </aside>

        <section class="contact-form-card" aria-labelledby="contact-form-title">
          <h2 class="contact-form-card__title" id="contact-form-title">Fale Conosco</h2>

          <form class="contact-form" [formGroup]="contactForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="contact-form__row">
              <div class="contact-field">
                <label class="contact-label" for="contact-name">Nome</label>
                <input
                  class="contact-input"
                  [class.contact-input--error]="isFieldInvalid('name')"
                  id="contact-name"
                  type="text"
                  formControlName="name"
                  autocomplete="name"
                  aria-describedby="contact-name-error"
                  [attr.aria-invalid]="isFieldInvalid('name') ? 'true' : null"
                />
                <p
                  class="contact-error"
                  [class.contact-error--visible]="isFieldInvalid('name')"
                  id="contact-name-error"
                  aria-live="polite"
                >
                  {{ getFieldError('name') }}
                </p>
              </div>

              <div class="contact-field">
                <label class="contact-label" for="contact-email">E-mail</label>
                <input
                  class="contact-input"
                  [class.contact-input--error]="isFieldInvalid('email')"
                  id="contact-email"
                  type="email"
                  formControlName="email"
                  autocomplete="email"
                  aria-describedby="contact-email-error"
                  [attr.aria-invalid]="isFieldInvalid('email') ? 'true' : null"
                />
                <p
                  class="contact-error"
                  [class.contact-error--visible]="isFieldInvalid('email')"
                  id="contact-email-error"
                  aria-live="polite"
                >
                  {{ getFieldError('email') }}
                </p>
              </div>
            </div>

            <div class="contact-field">
              <label class="contact-label" for="contact-message">Mensagem</label>
              <textarea
                class="contact-input contact-textarea"
                [class.contact-input--error]="isFieldInvalid('message')"
                id="contact-message"
                formControlName="message"
                aria-describedby="contact-message-error"
                [attr.aria-invalid]="isFieldInvalid('message') ? 'true' : null"
              ></textarea>
              <p
                class="contact-error"
                [class.contact-error--visible]="isFieldInvalid('message')"
                id="contact-message-error"
                aria-live="polite"
              >
                {{ getFieldError('message') }}
              </p>
            </div>

            <div class="contact-actions">
              <button class="contact-button contact-button--primary" type="submit">
                Enviar por e-mail
              </button>

              <a
                class="contact-button contact-button--secondary"
                [href]="whatsappUrl"
                target="_blank"
                rel="noreferrer"
              >
                Falar pelo WhatsApp
              </a>
            </div>
          </form>
        </section>
      </div>
    </section>
  </main>
</app-site-shell>
